# 工作流名称
name: Build Windows Only

# 触发条件：允许手动触发
on:
  workflow_dispatch:

# 定义工作任务
jobs:
  # 只保留 Windows 的编译任务
  build-windows:
    # 在最新的 Windows 环境上运行
    runs-on: windows-latest
    
    # 定义任务步骤
    steps:
      # 第1步：从你的仓库拉取代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      # 第2步：设置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          cache: true

      # 第3步：开启 Flutter 对 Windows 桌面应用的支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop

      # 第4步：进入 app 目录并安装所有依赖包
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      # 第5步：安装打包工具 flutter_distributor
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      # 第6步：执行打包命令
      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean

      # 第7步：上传编译好的文件，这是最关键的一步！
      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          # 上传后的文件名会是 "windows-build"
          name: windows-build
          # 需要上传的文件的路径
          path: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip

      # 第8步：打印一条完成消息
      - name: Done
        run: echo "Windows build is complete. You can now download the artifact."
